<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="theme-color" content="#0a0a1a" />
  <meta name="description" content="Compare facial features with family members or celebrities using AI-powered face analysis" />
  <link rel="manifest" href="manifest.json" />
  <title>Resemble — AI Face Comparison</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <script src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
</head>
<body>

  <!-- ── NAV BAR ── -->
  <nav class="navbar" id="navbar">
    <a href="#" class="nav-brand" data-nav="landing">
      <div class="nav-logo">R</div>
      <span class="nav-name">Resemble</span>
    </a>
    <div class="nav-links" id="nav-links">
      <a href="#family" class="nav-link" data-nav="family">Family</a>
      <a href="#celebrity" class="nav-link" data-nav="celebrity">Celebrity</a>
    </div>
  </nav>

  <!-- ── MODEL LOADING BANNER ── -->
  <div id="model-banner" class="model-banner">
    <div class="spinner"></div>
    <span id="model-status-text">Loading AI face models&hellip;</span>
  </div>

  <!-- ── APP CONTAINER ── -->
  <div id="app" class="app-container"></div>

  <!-- ── CAMERA MODAL ── -->
  <div class="camera-modal" id="camera-modal" style="display:none">
    <div class="camera-content">
      <button class="camera-close" id="camera-close">&times;</button>
      <div class="camera-viewport">
        <video id="camera-video" autoplay playsinline muted></video>
        <canvas id="camera-overlay" class="camera-overlay-canvas"></canvas>
        <div class="face-guide">
          <svg viewBox="0 0 300 400" class="face-oval-svg">
            <defs>
              <mask id="oval-mask">
                <rect width="300" height="400" fill="white"/>
                <ellipse cx="150" cy="185" rx="105" ry="140" fill="black"/>
              </mask>
            </defs>
            <rect width="300" height="400" fill="rgba(0,0,0,0.6)" mask="url(#oval-mask)"/>
            <ellipse cx="150" cy="185" rx="105" ry="140" fill="none" stroke="url(#scan-gradient)" stroke-width="3" class="scan-ring"/>
            <defs>
              <linearGradient id="scan-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" stop-color="#7c3aed"/>
                <stop offset="50%" stop-color="#a855f7"/>
                <stop offset="100%" stop-color="#6366f1"/>
              </linearGradient>
            </defs>
          </svg>
        </div>
        <div class="scan-line" id="scan-line"></div>
      </div>
      <div class="camera-status" id="camera-status">Position your face within the oval</div>
      <div class="camera-quality" id="camera-quality"></div>
      <div class="camera-actions">
        <button class="camera-capture-btn" id="camera-capture-btn" disabled>
          <div class="capture-ring">
            <div class="capture-dot"></div>
          </div>
        </button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
